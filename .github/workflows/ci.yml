name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check all workspaces
        run: npm run typecheck

      - name: Run server tests with coverage
        run: npm --workspace server run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: server/coverage/lcov.info
          if-no-files-found: warn

      - name: Build server
        run: npm run build:server

      - name: Build Vue client (flagship)
        run: npm run build:client

      - name: Build Svelte parity app
        run: npm run build:svelte

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pulseboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run -d --name pulseboard -p 4000:4000 pulseboard:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4000/api/health > /dev/null; then
              echo "health OK"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:4000/api/health | tee /dev/stderr | grep -q '"status":"ok"'
          curl -fsS http://localhost:4000/ | grep -qi '<title>PulseBoard'
          docker rm -f pulseboard
